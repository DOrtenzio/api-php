<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test API</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --danger: #dc2626;
            --success: #16a34a;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }
        
        /* Reset */
        * {
            box-sizing: border-box;
        }
        
        /* Body */
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #e2e8f0, #f8fafc);
            margin: 0;
            padding: 30px 15px;
            color: var(--text);
        }
        
        /* Container */
        .container {
            max-width: 1000px;
            margin: auto;
        }
        
        /* Card */
        .card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-bottom: 2rem;
            transition: transform 0.2s ease;
        }
        
        .card:hover {
            transform: translateY(-3px);
        }
        
        /* Titles */
        h2, h3 {
            margin-top: 0;
            font-weight: 600;
        }
        
        /* Form */
        .form-group {
            display: grid;
            grid-template-columns: 1fr 120px 160px auto;
            gap: 12px;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        input {
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s ease;
        }
        
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }
        
        /* Buttons */
        button {
            cursor: pointer;
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        
        .btn-add {
            background: var(--primary);
            color: white;
        }
        
        .btn-add:hover {
            background: var(--primary-dark);
        }
        
        .btn-edit {
            background: #e2e8f0;
            color: #334155;
        }
        
        .btn-edit:hover {
            background: #cbd5e1;
        }
        
        .btn-delete {
            background: #fee2e2;
            color: var(--danger);
        }
        
        .btn-delete:hover {
            background: #fecaca;
        }
        
        #cancelBtn {
            background: #64748b;
            color: white;
            margin-top: 10px;
        }
        
        #cancelBtn:hover {
            background: #475569;
        }
        
        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            overflow: hidden;
            border-radius: 12px;
        }
        
        thead {
            background: var(--primary);
            color: white;
        }
        
        th, td {
            padding: 14px;
            text-align: left;
        }
        
        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.2s ease;
        }
        
        tbody tr:hover {
            background: #f8fafc;
        }
        
        /* Badge */
        .status-badge {
            font-size: 12px;
            padding: 6px 10px;
            border-radius: 20px;
            background: #dcfce7;
            color: var(--success);
            display: none;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .form-group {
                grid-template-columns: 1fr;
            }
        
            table, thead, tbody, th, td, tr {
                display: block;
            }
        
            thead {
                display: none;
            }
        
            tbody tr {
                background: white;
                margin-bottom: 1rem;
                padding: 1rem;
                border-radius: 12px;
                box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            }
        
            td {
                padding: 8px 0;
                border: none;
            }
        
            td::before {
                content: attr(data-label);
                font-weight: bold;
                display: block;
                font-size: 12px;
                color: #64748b;
                margin-bottom: 2px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Gestione Utenti</h2>
        <div id="userForm">
            <input type="hidden" id="editId">
            <div class="form-group">
                <input type="text" id="nome" placeholder="Nome completo" required>
                <input type="number" id="eta" placeholder="Età" required min="0" max="150">
                <input type="date" id="data" required>
                <button onclick="saveUser()" id="saveBtn" class="btn-add">Aggiungi Utente</button>
            </div>
            <button onclick="resetForm()" id="cancelBtn" style="display:none; background:#94a3b8; color:white;">Annulla Modifica</button>
        </div>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3>Lista Utenti</h3>
            <span id="status" class="status-badge">Sincronizzato</span>
        </div>
        <table id="userTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Età</th>
                    <th>Data</th>
                    <th>Azioni</th>
                </tr>
            </thead>
            <tbody id="userList">
                </tbody>
        </table>
    </div>
</div>

<script>
    const baseUrl = "http://localhost/wsphp/api";
    
    // Carica utenti
    document.addEventListener('DOMContentLoaded', fetchUsers);
    
    async function fetchUsers() {
        try {
            const res = await fetch(baseUrl, {
                headers: { "Accept": "application/json" }
            });
            const data = await res.json();
            renderTable(data);
        } catch (err) {
            console.error("Errore caricamento:", err);
            alert("Errore nel caricamento degli utenti. Verifica che il server sia attivo.");
        }
    }
    
    function renderTable(users) {
        const tbody = document.getElementById('userList');
        tbody.innerHTML = '';

        Object.keys(users).forEach(id => {
            const user = users[id];
            const tr = document.createElement('tr');
            
            // Escape dei dati per sicurezza
            const safeName = escapeHtml(user.name);
            const safeAge = escapeHtml(user.age);
            const safeDate = escapeHtml(user.date);
            
            tr.innerHTML = `
                <td data-label="ID">#${id}</td>
                <td data-label="Nome">${safeName}</td>
                <td data-label="Età">${safeAge}</td>
                <td data-label="Data">${safeDate}</td>
                <td data-label="Azioni">
                    <button class="btn-edit" data-action="edit">Modifica</button>
                    <button class="btn-delete" data-action="delete">Elimina</button>
                </td>
            `;
            
            // Event delegation per evitare problemi con apici nei dati
            tr.querySelector('[data-action="edit"]').addEventListener('click', () => {
                editUser(id, user.name, user.age, user.date);
            });
            
            tr.querySelector('[data-action="delete"]').addEventListener('click', () => {
                deleteUser(id);
            });
            
            tbody.appendChild(tr);
        });
    }
    
    // Funzione di escape HTML per prevenire XSS
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    async function saveUser() {
        const id = document.getElementById('editId').value;
        const name = document.getElementById('nome').value.trim();
        const age = document.getElementById('eta').value;
        const date = document.getElementById('data').value;
    
        if(!name || !age || !date) {
            alert("Compila tutti i campi!");
            return;
        }
        
        // Validazione età
        const ageNum = parseInt(age);
        if(isNaN(ageNum) || ageNum < 0 || ageNum > 150) {
            alert("Inserisci un'età valida (0-150)");
            return;
        }
    
        const method = id === "" ? "POST" : "PUT";
        const url = id === "" ? baseUrl : `${baseUrl}/${id}`;
    
        try {
            const res = await fetch(url, {
                method: method,
                headers: {
                    "Content-Type": "application/json",
                    "Accept": "application/json"
                },
                body: JSON.stringify({ name, age: ageNum, date })
            });
    
            if(res.ok) {
                resetForm();
                fetchUsers();
                showStatus();
            } else {
                const error = await res.json();
                alert("Errore nel salvataggio: " + (error.errore || "Errore sconosciuto"));
            }
        } catch (err) {
            console.error(err);
            alert("Errore durante il salvataggio. Verifica la connessione al server.");
        }
    }
    
    async function deleteUser(id) {
        if(!confirm("Sei sicuro di voler eliminare questo utente?")) return;
    
        try {
            const res = await fetch(`${baseUrl}/${id}`, { method: "DELETE" });
            if(res.ok) {
                fetchUsers();
                showStatus();
            } else {
                alert("Errore nell'eliminazione");
            }
        } catch (err) {
            console.error(err);
            alert("Errore durante l'eliminazione");
        }
    }
    
    function editUser(id, name, age, date) {
        document.getElementById('editId').value = id;
        document.getElementById('nome').value = name;
        document.getElementById('eta').value = age;
        document.getElementById('data').value = date;
    
        document.getElementById('saveBtn').innerText = "Aggiorna Utente";
        document.getElementById('cancelBtn').style.display = "inline-block";
    }
    
    function resetForm() {
        document.getElementById('editId').value = "";
        document.getElementById('nome').value = "";
        document.getElementById('eta').value = "";
        document.getElementById('data').value = "";
    
        document.getElementById('saveBtn').innerText = "Aggiungi Utente";
        document.getElementById('cancelBtn').style.display = "none";
    }
    
    function showStatus() {
        const badge = document.getElementById('status');
        badge.style.display = "inline";
        setTimeout(() => badge.style.display = "none", 2000);
    }
</script>

</body>
</html>
