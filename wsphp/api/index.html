<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Gestionale Utenti</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="container">

<header>
    <h1>Gestione Utenti</h1>
    <button class="btn-primary" onclick="aggiuntaUtenti()">+ Nuovo Utente</button>
</header>

<table>
    <thead>
        <tr>
            <th>Nome</th>
            <th>Età</th>
            <th>Data</th>
            <th></th>
        </tr>
    </thead>
    <tbody id="userTable"></tbody>
</table>

<div id="notification" class="notification"></div>

</div>

<div class="modal" id="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Nuovo Utente</h3>
        <input type="hidden" id="userId">
        <input type="text" id="name" placeholder="Nome">
        <input type="number" id="age" placeholder="Età">
        <input type="date" id="date">
        <button class="btn-primary" onclick="salvaAggiuntaOModificaUtenti()">Salva</button>
        <button class="btn-close" onclick="chiudiModale()">Annulla</button>
    </div>
</div>

<script>
const baseUrl = "http://localhost/wsphp/api/";
const table = document.getElementById("userTable");

function notify(message, type="success") {
    const n = document.getElementById("notification");
    n.textContent = message;
    n.className = "notification " + type;
    n.style.display = "block";
    setTimeout(() => n.style.display = "none", 3000);
}

function getUtenti() {
    fetch(baseUrl)
    .then(r => r.json())
    .then(data => {
        console.log("GET: ");
        table.innerHTML = "";
        data.forEach(user => {
            console.log(user);
            const tr = document.createElement("tr");
            tr.dataset.id = user.id; 

            tr.innerHTML = `
                <td>${user.name}</td>
                <td>${user.age}</td>
                <td>${user.date}</td>
                <td class="actions">
                    <button class="btn-edit">Modifica</button>
                    <button class="btn-delete">Elimina</button>
                </td>
            `;

            tr.querySelector(".btn-edit").addEventListener("click", () => modificaUtenti(user));
            tr.querySelector(".btn-delete").addEventListener("click", () => cancellaUtente(user.id));
            table.appendChild(tr);
        });
    });
}

function aggiuntaUtenti() {
    document.getElementById("modalTitle").textContent = "Nuovo Utente";
    document.getElementById("userId").value = "";
    document.getElementById("name").value = "";
    document.getElementById("age").value = "";
    document.getElementById("date").value = "";
    document.getElementById("modal").style.display = "flex";
}

function chiudiModale() {
    document.getElementById("modal").style.display = "none";
}

function modificaUtenti(user) {
    document.getElementById("modalTitle").textContent = "Modifica Utente";
    document.getElementById("userId").value = user.id;
    document.getElementById("name").value = user.name;
    document.getElementById("age").value = user.age;
    document.getElementById("date").value = user.date;
    document.getElementById("modal").style.display = "flex";
}

function salvaAggiuntaOModificaUtenti() {
    const id = document.getElementById("userId").value;
    const user = {
        name: document.getElementById("name").value,
        age: document.getElementById("age").value,
        date: document.getElementById("date").value
    };

    const method = id ? "PUT" : "POST";
    const url = id ? baseUrl + id : baseUrl;
    console.log(method+": ");
    console.log("Body: "+JSON.stringify(user));

    fetch(url, {
        method: method,
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(user)
    })
    .then(r => {
        r.json();
    })
    .then(() => {
        notify(id ? "Utente aggiornato" : "Utente creato");
        chiudiModale();
        getUtenti();
    });
}

function cancellaUtente(id) {
    if(!confirm("Eliminare questo utente?")) return; 

    console.log("DELETE: ");
    console.log("Id: "+id);

    fetch(baseUrl + id, { method: "DELETE" })
    .then(r => r.json())
    .then(() => {
        notify("Utente eliminato", "success");
        getUtenti();
    });
}

setInterval(getUtenti(),120000);
</script>

</body>
</html>
